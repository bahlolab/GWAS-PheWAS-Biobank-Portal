name: Update Metadata

on:
  schedule:
    # First day of every month at 04:00 UTC
    - cron: "0 4 1 * *"
  push:
    branches: [main]
    paths:
      - "scripts/build_database.py"
  workflow_dispatch: {}

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild database from source of truth
        run: python3 scripts/build_database.py

      - name: Regenerate Markdown table fragments
        run: python3 scripts/generate_tables.py

      - name: Splice tables into README.md
        run: python3 scripts/update_readme.py

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate portal database and README tables"
          title: "Automated metadata refresh"
          body: |
            Automated run of `build_database.py` -> `generate_tables.py` -> `update_readme.py`.

            This PR is opened only when the generated files (`data/portals.csv`,
            `data/portals.json`, `README.md`, `docs/_portal_table.md`,
            `docs/_feature_matrix.md`) actually changed relative to `main`.

            Please review the diff before merging - in particular check that
            any manual edits to `data/portals.*` were not accidentally reverted
            (they should instead be made in `scripts/build_database.py`).
          branch: automated/metadata-refresh
          labels: automated
          delete-branch: true
