name: Check Links

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate_links.py"
  workflow_dispatch: {}

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all portal URLs
        id: validate
        run: |
          python3 scripts/validate_links.py --timeout 20 --sleep 0.5 || echo "broken=true" >> "$GITHUB_OUTPUT"

      - name: Upload link status report
        uses: actions/upload-artifact@v4
        with:
          name: link-status
          path: data/link_status.json

      - name: Commit updated link_status.json (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/link_status.json
          git diff --staged --quiet || git commit -m "chore: update link_status.json [skip ci]"
          git push

      - name: Fail workflow if broken links found (informational)
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("data/link_status.json") as f:
              data = json.load(f)
          broken = [pid for pid, r in data["results"].items() if r["status"] != "ok"]
          if broken:
              print(f"::warning::{len(broken)} portal URL(s) failed reachability check: {', '.join(broken)}")
          else:
              print("All portal URLs reachable.")
          EOF
